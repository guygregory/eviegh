<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Evie's Green Eggs &amp; Ham Words</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:#aee4f7;
    --sky-deep:#7fd0ef;
    --grass:#58b947;
    --seuss-green:#3f9b34;
    --seuss-red:#e63946;
    --seuss-red-deep:#c1121f;
    --ink:#16302b;
    --card:#fffdf5;
    --sun:#ffd23f;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; height:100%;
    overflow:hidden;
    touch-action:manipulation;
    -webkit-user-select:none; user-select:none;
    font-family:"Fredoka","Comic Sans MS","Comic Sans",ui-rounded,system-ui,sans-serif;
  }
  body{
    background:
      radial-gradient(ellipse 120% 60% at 50% 115%, var(--grass) 0%, var(--grass) 28%, transparent 28.5%),
      linear-gradient(180deg, var(--sky) 0%, var(--sky-deep) 100%);
    color:var(--ink);
  }

  /* ---------- floating whimsy doodles ---------- */
  .doodle{
    position:fixed; z-index:0; pointer-events:none;
    opacity:.85; filter:drop-shadow(0 4px 6px rgba(0,0,0,.12));
    animation:bob 6s ease-in-out infinite;
  }
  @keyframes bob{
    0%,100%{ transform:translateY(0) rotate(-4deg); }
    50%{ transform:translateY(-18px) rotate(5deg); }
  }
  .doodle.d1{ top:6%;  left:4%;  width:11vmin; animation-duration:7s; }
  .doodle.d2{ top:10%; right:5%; width:13vmin; animation-duration:5.5s; animation-delay:-2s; }
  .doodle.d3{ bottom:7%; left:7%; width:12vmin; animation-duration:8s; animation-delay:-1s; }
  .doodle.d4{ bottom:9%; right:8%; width:10vmin; animation-duration:6.5s; animation-delay:-3.5s; }
  .cloud{
    position:fixed; z-index:0; pointer-events:none; opacity:.9;
    animation:drift linear infinite;
  }
  @keyframes drift{
    from{ transform:translateX(-25vw); }
    to{ transform:translateX(125vw); }
  }
  .cloud.c1{ top:5%;  width:16vmin; animation-duration:75s; }
  .cloud.c2{ top:22%; width:11vmin; animation-duration:105s; animation-delay:-40s; }

  /* ---------- stage & card ---------- */
  #stage{
    position:relative; z-index:1;
    height:100%; width:100%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  #card{
    background:var(--card);
    border:1.2vmin solid var(--seuss-red);
    outline:0.6vmin solid #fff;
    border-radius:6vmin;
    width:min(86vw, 150vmin);
    height:min(64vh, 72vmin);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 2.2vmin 0 rgba(0,0,0,.15), inset 0 0 0 1.2vmin #fff;
    position:relative;
    overflow:hidden;
  }
  #card::before, #card::after{ /* tiny corner eggs */
    content:""; position:absolute; width:7vmin; height:5.4vmin;
    background:radial-gradient(circle at 50% 52%, var(--seuss-green) 0 30%, #fff 31% 100%);
    border-radius:50% 50% 48% 52% / 60% 58% 42% 40%;
    border:.45vmin solid var(--ink);
    opacity:.9;
  }
  #card::before{ top:3vmin; left:3.4vmin; transform:rotate(-14deg); }
  #card::after{ bottom:3vmin; right:3.4vmin; transform:rotate(12deg); }
  #word{
    font-weight:700;
    line-height:1;
    color:var(--ink);
    letter-spacing:.02em;
    text-align:center;
    padding:0 4vmin;
    max-width:100%;
    white-space:nowrap;
    transform-origin:center;
  }
  .pop-in{ animation:popIn .45s cubic-bezier(.2,1.6,.4,1) both; }
  @keyframes popIn{
    from{ transform:scale(.2) rotate(-8deg); opacity:0; }
    to{ transform:scale(1) rotate(0); opacity:1; }
  }
  .pop-out{ animation:popOut .22s ease-in both; }
  @keyframes popOut{
    to{ transform:scale(.1) rotate(10deg); opacity:0; }
  }

  /* ---------- hint ---------- */
  #hint{
    position:fixed; bottom:2.2vh; left:0; right:0; z-index:1;
    text-align:center; font-size:max(15px, 2.6vmin); font-weight:600;
    color:#0d3b53; opacity:.75; pointer-events:none;
  }

  /* ---------- progress bar ---------- */
  #progress{
    position:fixed; top:2.6vh; left:50%; transform:translateX(-50%);
    z-index:4; width:min(44vw, 560px); height:max(24px, 4vmin);
    background:#fff; border:.55vmin solid var(--ink);
    border-radius:6vmin;
    box-shadow:0 .7vmin 0 rgba(0,0,0,.2);
    pointer-events:none;
  }
  #progressTrack{
    position:absolute; inset:0; border-radius:inherit; overflow:hidden;
  }
  #progressFill{
    height:100%; width:0%;
    background:linear-gradient(90deg, var(--grass), var(--seuss-green));
    transition:width .5s cubic-bezier(.2,1.2,.4,1);
  }
  #progressEgg{
    position:absolute; top:50%; left:0%;
    transform:translate(-50%,-52%);
    font-size:max(26px, 4.6vmin); line-height:1;
    transition:left .5s cubic-bezier(.2,1.2,.4,1);
    filter:drop-shadow(0 .4vmin .4vmin rgba(0,0,0,.25));
  }

  /* ---------- finish screen ---------- */
  #finish{
    position:fixed; inset:0; z-index:6;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    gap:2vmin; cursor:pointer;
    background:
      radial-gradient(ellipse 120% 60% at 50% 115%, var(--grass) 0%, var(--grass) 24%, transparent 24.5%),
      linear-gradient(180deg, #ffe9a8 0%, var(--sun) 100%);
  }
  #finish.show{ display:flex; }
  #finishEmoji{
    font-size:17vmin; line-height:1;
    animation:bob 2.4s ease-in-out infinite;
    filter:drop-shadow(0 1vmin 1vmin rgba(0,0,0,.2));
  }
  #finishText{
    font-size:11vmin; font-weight:700; color:var(--seuss-red);
    text-shadow:.5vmin .5vmin 0 #fff, -.5vmin -.5vmin 0 #fff, .5vmin -.5vmin 0 #fff, -.5vmin .5vmin 0 #fff;
    animation:popIn .6s cubic-bezier(.2,1.6,.4,1) both;
    text-align:center; padding:0 4vmin;
  }
  #finishSub{
    font-size:max(17px, 3.6vmin); font-weight:600; color:var(--ink);
  }
  #againBtn{
    margin-top:2vmin;
    border:.55vmin solid var(--ink);
    background:var(--seuss-red); color:#fff;
    border-radius:6vmin; padding:2vmin 6vmin;
    font-size:max(19px, 3.6vmin); font-weight:700;
    cursor:pointer; box-shadow:0 .8vmin 0 rgba(0,0,0,.25);
    min-height:48px;
  }
  #againBtn:active{ transform:scale(.93); }

  /* ---------- buttons ---------- */
  button{ font-family:inherit; }
  .round-btn{
    position:fixed; z-index:5;
    width:max(52px, 8.5vmin); height:max(52px, 8.5vmin);
    border-radius:50%;
    border:.55vmin solid var(--ink);
    background:#fff;
    font-size:max(24px, 4.2vmin);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    box-shadow:0 .7vmin 0 rgba(0,0,0,.25);
    transition:transform .12s;
    line-height:1;
    padding:0;
  }
  .round-btn:active{ transform:scale(.9); }
  #gearBtn{ top:2.2vh; right:2vw; background:var(--sun); }
  #speakBtn{ bottom:2.2vh; right:2vw; background:#fff; }
  #skipBtn{
    bottom:2.2vh; left:2vw;
    width:auto; border-radius:6vmin;
    padding:0 3.4vmin;
    font-size:max(17px, 2.9vmin); font-weight:700;
    background:var(--sun); color:var(--ink);
    display:none;
  }
  body.speech-mode #skipBtn{ display:flex; }

  /* ---------- listening indicator ---------- */
  #ear{
    position:fixed; top:2.2vh; left:2vw; z-index:5;
    display:none; align-items:center; gap:1.4vmin;
    background:#fff; border:.55vmin solid var(--ink);
    border-radius:6vmin; padding:1vmin 2.6vmin;
    font-size:max(15px, 2.7vmin); font-weight:600;
    box-shadow:0 .7vmin 0 rgba(0,0,0,.2);
  }
  body.speech-mode #ear{ display:flex; }
  #earIcon{ font-size:max(22px, 3.6vmin); }
  #ear.listening #earIcon{ animation:pulse 1.1s ease-in-out infinite; }
  @keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.35); }
  }

  /* ---------- celebration ---------- */
  .burst{
    position:fixed; z-index:8; pointer-events:none;
    font-size:5vmin; will-change:transform,opacity;
    animation:fly 1s ease-out forwards;
  }
  @keyframes fly{
    from{ transform:translate(0,0) scale(.6) rotate(0); opacity:1; }
    to{ transform:translate(var(--dx), var(--dy)) scale(1.4) rotate(var(--rot)); opacity:0; }
  }
  #cheer{
    position:fixed; inset:0; z-index:7; pointer-events:none;
    display:flex; align-items:center; justify-content:center;
    font-size:9vmin; font-weight:700; color:var(--seuss-red);
    text-shadow:.5vmin .5vmin 0 #fff, -.5vmin -.5vmin 0 #fff, .5vmin -.5vmin 0 #fff, -.5vmin .5vmin 0 #fff;
    opacity:0;
  }
  #cheer.show{ animation:cheerPop 1.1s cubic-bezier(.2,1.6,.4,1) both; }
  @keyframes cheerPop{
    0%{ opacity:0; transform:scale(.3) rotate(-6deg); }
    25%{ opacity:1; transform:scale(1.1) rotate(2deg); }
    75%{ opacity:1; transform:scale(1) rotate(0); }
    100%{ opacity:0; transform:scale(1.2); }
  }

  /* ---------- settings panel ---------- */
  #overlay{
    position:fixed; inset:0; z-index:10;
    background:rgba(13,40,30,.55);
    display:none; align-items:center; justify-content:center;
    cursor:default;
  }
  #overlay.open{ display:flex; }
  #panel{
    background:var(--card);
    border:1vmin solid var(--seuss-green);
    border-radius:5vmin;
    padding:4vmin 5vmin;
    width:min(92vw, 560px);
    max-height:90vh; overflow-y:auto;
    box-shadow:0 2vmin 0 rgba(0,0,0,.3);
  }
  #panel h2{
    margin:0 0 2.5vmin; font-size:max(22px, 4vmin);
    color:var(--seuss-red); text-align:center;
  }
  .setting{ margin-bottom:3vmin; }
  .setting .label{
    font-size:max(15px, 2.6vmin); font-weight:600; margin-bottom:1.2vmin;
  }
  .seg{
    display:flex; gap:1.4vmin; flex-wrap:wrap;
  }
  .seg button{
    flex:1 1 auto;
    border:.5vmin solid var(--ink);
    background:#fff; color:var(--ink);
    border-radius:3vmin;
    padding:1.6vmin 2vmin;
    font-size:max(15px, 2.6vmin); font-weight:600;
    cursor:pointer;
    box-shadow:0 .5vmin 0 rgba(0,0,0,.2);
    min-height:48px;
  }
  .seg button.on{
    background:var(--seuss-green); color:#fff; border-color:var(--seuss-green);
  }
  .seg button:disabled{ opacity:.45; cursor:not-allowed; }
  #speechNote{
    font-size:max(12px, 2vmin); color:var(--seuss-red-deep);
    margin-top:1vmin; display:none;
  }
  #closeBtn{
    display:block; margin:1vmin auto 0;
    border:.5vmin solid var(--ink);
    background:var(--seuss-red); color:#fff;
    border-radius:3.5vmin; padding:1.8vmin 6vmin;
    font-size:max(17px, 3vmin); font-weight:700;
    cursor:pointer; box-shadow:0 .6vmin 0 rgba(0,0,0,.25);
    min-height:48px;
  }
</style>
</head>
<body>
  <!--
    Word list lives in the WORDS array in the script below.
    words.csv in this folder is the human-editable reference copy —
    if you change one, update the other to match.
  -->

  <!-- background whimsy -->
  <svg class="cloud c1" viewBox="0 0 100 60"><g fill="#fff"><ellipse cx="35" cy="38" rx="28" ry="16"/><ellipse cx="62" cy="32" rx="24" ry="14"/><ellipse cx="50" cy="22" rx="18" ry="12"/></g></svg>
  <svg class="cloud c2" viewBox="0 0 100 60"><g fill="#fff"><ellipse cx="35" cy="38" rx="28" ry="16"/><ellipse cx="62" cy="32" rx="24" ry="14"/><ellipse cx="50" cy="22" rx="18" ry="12"/></g></svg>

  <!-- green egg -->
  <svg class="doodle d1" viewBox="0 0 100 84"><ellipse cx="50" cy="46" rx="46" ry="34" fill="#fffdf5" stroke="#16302b" stroke-width="3"/><circle cx="50" cy="44" r="16" fill="#3f9b34" stroke="#2c7024" stroke-width="3"/><circle cx="44" cy="38" r="4.5" fill="#7ed06f"/></svg>
  <!-- ham -->
  <svg class="doodle d2" viewBox="0 0 100 90"><path d="M14 52 C14 24 36 12 56 14 C80 16 92 34 90 54 C88 74 68 84 48 82 C28 80 14 70 14 52 Z" fill="#e87ea1" stroke="#16302b" stroke-width="3"/><path d="M30 50 C30 36 42 28 54 30 C68 32 76 42 74 54 C72 66 60 72 48 70 C36 68 30 60 30 50 Z" fill="#f6b8cd"/><circle cx="52" cy="50" r="6" fill="#fffdf5" stroke="#16302b" stroke-width="2.5"/></svg>
  <!-- green egg 2 -->
  <svg class="doodle d3" viewBox="0 0 100 84"><ellipse cx="50" cy="46" rx="46" ry="34" fill="#fffdf5" stroke="#16302b" stroke-width="3"/><circle cx="52" cy="46" r="16" fill="#3f9b34" stroke="#2c7024" stroke-width="3"/><circle cx="46" cy="40" r="4.5" fill="#7ed06f"/></svg>
  <!-- seuss hat -->
  <svg class="doodle d4" viewBox="0 0 80 100"><g stroke="#16302b" stroke-width="3"><path d="M20 14 L60 14 L64 78 L16 78 Z" fill="#fffdf5"/><path d="M19 24 L61 24 L62 40 L18 40 Z" fill="#e63946" stroke="none"/><path d="M17 52 L63 52 L64 68 L16 68 Z" fill="#e63946" stroke="none"/><path d="M20 14 L60 14 L64 78 L16 78 Z" fill="none"/><ellipse cx="40" cy="82" rx="34" ry="9" fill="#fffdf5"/></g></svg>

  <main id="stage" aria-label="Flashcard – tap to go to the next word">
    <div id="card"><div id="word" aria-live="polite"></div></div>
  </main>

  <div id="progress" aria-label="Progress through the words">
    <div id="progressTrack"><div id="progressFill"></div></div>
    <span id="progressEgg">🍳</span>
  </div>

  <div id="ear"><span id="earIcon">👂</span><span id="earText">I'm listening…</span></div>
  <div id="cheer"></div>
  <div id="hint">tap anywhere or press space for the next word</div>

  <div id="finish" aria-label="All words finished – tap to play again">
    <div id="finishEmoji">🎉</div>
    <div id="finishText">Well done!</div>
    <div id="finishSub">You read ALL the words!</div>
    <button id="againBtn">Play again 🔁</button>
  </div>

  <button id="gearBtn" class="round-btn" aria-label="Settings">⚙️</button>
  <button id="speakBtn" class="round-btn" aria-label="Hear the word">🔊</button>
  <button id="skipBtn" aria-label="Skip this word">Skip ⏭️</button>

  <div id="overlay">
    <div id="panel" role="dialog" aria-label="Settings">
      <h2>Grown-up Settings</h2>
      <div class="setting">
        <div class="label">Mode</div>
        <div class="seg" id="modeSeg">
          <button data-mode="manual">👆 Tap / Space</button>
          <button data-mode="speech">🎤 Say the word</button>
        </div>
        <div id="speechNote"></div>
      </div>
      <div class="setting">
        <div class="label">Difficulty</div>
        <div class="seg" id="diffSeg">
          <button data-diff="easy">🥚 Easy</button>
          <button data-diff="medium">🍳 Medium</button>
          <button data-diff="hard">🎩 Hard</button>
        </div>
      </div>
      <div class="setting">
        <div class="label">Sounds</div>
        <div class="seg" id="soundSeg">
          <button data-sound="on">🔔 On</button>
          <button data-sound="off">🔕 Off</button>
        </div>
      </div>
      <button id="closeBtn">Let's read! 📖</button>
    </div>
  </div>

<script>
"use strict";

/* ============================================================
   WORDS  (source of truth; keep in sync with words.csv)
   tier 1 = easy, 2 = medium, 3 = hard
   ============================================================ */
const WORDS = [
  { w:"a",        tier:1 }, { w:"am",      tier:1 }, { w:"and",   tier:1 },
  { w:"are",      tier:1 }, { w:"be",      tier:1 }, { w:"do",    tier:1 },
  { w:"eat",      tier:1 }, { w:"the",     tier:1 }, { w:"I",     tier:1 },
  { w:"if",       tier:1 }, { w:"in",      tier:1 }, { w:"me",    tier:1 },
  { w:"not",      tier:1 }, { w:"on",      tier:1 }, { w:"or",    tier:1 },
  { w:"so",       tier:1 }, { w:"you",     tier:1 }, { w:"see",   tier:1 },
  { w:"say",      tier:1 },
  { w:"boat",     tier:2 }, { w:"box",     tier:2 }, { w:"car",   tier:2 },
  { w:"dark",     tier:2 }, { w:"eggs",    tier:2 }, { w:"fox",   tier:2 },
  { w:"goat",     tier:2 }, { w:"good",    tier:2 }, { w:"green", tier:2 },
  { w:"ham",      tier:2 }, { w:"here",    tier:2 }, { w:"let",   tier:2 },
  { w:"like",     tier:2 }, { w:"may",     tier:2 }, { w:"rain",  tier:2 },
  { w:"Sam",      tier:2 }, { w:"that",    tier:2 }, { w:"them",  tier:2 },
  { w:"they",     tier:2 }, { w:"there",   tier:2 }, { w:"thank", tier:2 },
  { w:"tree",     tier:2 }, { w:"try",     tier:2 }, { w:"will",  tier:2 },
  { w:"with",     tier:2 }, { w:"house",   tier:2 }, { w:"mouse", tier:2 },
  { w:"train",    tier:2 },
  { w:"anywhere", tier:3 }, { w:"could",   tier:3 }, { w:"would", tier:3 }
];

/* Sounds-alike words the speech recogniser may return instead.
   Matching is whole-token only — never substring — to avoid
   false positives on tiny words. */
const HOMOPHONES = {
  "a":["ay","eh","uh"],          "am":["i'm","em"],
  "and":["an","end"],            "are":["r","our","arr"],
  "be":["bee","b"],              "do":["due","dew","doo"],
  "eat":["eats"],                "the":["thee","duh"],
  "i":["eye","aye","hi"],        "in":["inn","n"],
  "me":["mi","mee"],             "not":["knot","naught"],
  "or":["oar","ore","oh"],       "so":["sew","sow"],
  "you":["u","ewe","yew"],       "see":["sea","c","si"],
  "say":["hey","they"],          "may":["mae","my"],
  "here":["hear"],               "there":["their","they're"],
  "would":["wood"],              "could":["good"],
  "rain":["reign","rein","ran"], "tree":["three"],
  "eggs":["egg","x"],            "sam":["sham","san","some"],
  "ham":["am","hem"],            "thank":["thanks","think"],
  "they":["day","hey"],          "good":["could"],
  "green":["greene","grain"],    "train":["tran","chain"],
  "try":["tri","cry"],           "goat":["go","gout"],
  "boat":["bout","both"],        "box":["boss","bocks"],
  "fox":["focks","faux"],        "dark":["doc","duck"],
  "let":["lit"],                 "like":["lik"],
  "with":["whith"],              "will":["wheel"],
  "if":["of"],                   "on":["awn"],
  "that":["dat"],                "them":["dem"],
  "house":["how's","howse"],     "mouse":["mows"],
  "car":["cars"],                "anywhere":["any where","anyware"]
};

/* ============================================================
   STATE & SETTINGS
   ============================================================ */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const LS_KEY = "eviegh-settings";

const settings = Object.assign(
  { mode:"manual", diff:"easy", sound:true },
  (() => { try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; } })()
);
if (settings.mode === "speech" && !SR) settings.mode = "manual";

function saveSettings(){
  try { localStorage.setItem(LS_KEY, JSON.stringify(settings)); } catch {}
}

let deck = [];
let current = null;
let advancing = false;
let total = 0;
let finished = false;
let deckDirty = false;

const $ = id => document.getElementById(id);
const stage = $("stage"), wordEl = $("word"), hintEl = $("hint"),
      ear = $("ear"), earText = $("earText"), cheerEl = $("cheer"),
      overlay = $("overlay");

/* ============================================================
   DECK
   ============================================================ */
const TIER_MAX = { easy:1, medium:2, hard:3 };

function buildDeck(){
  const max = TIER_MAX[settings.diff] || 1;
  deck = WORDS.filter(x => x.tier <= max).map(x => x.w);
  for (let i = deck.length - 1; i > 0; i--){           // Fisher–Yates
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  total = deck.length;
}

function nextWord(){
  if (!deck.length){ finishGame(); return; }           // every word seen once
  current = deck.pop();
  showWord(current);
  updateProgress();
}

function updateProgress(){
  const done = finished ? total : Math.max(0, total - deck.length - 1);
  const pct = total ? (done / total) * 100 : 0;
  $("progressFill").style.width = pct + "%";
  $("progressEgg").style.left = pct + "%";
}

function showWord(w){
  wordEl.classList.remove("pop-in", "pop-out");
  void wordEl.offsetWidth;                              // restart animation
  wordEl.textContent = w;
  fitWord();
  wordEl.classList.add("pop-in");
}

/* Scale the word to fill the card, whatever its length. */
function fitWord(){
  const card = $("card");
  const availW = card.clientWidth * 0.82;
  const availH = card.clientHeight * 0.62;
  let size = availH;
  wordEl.style.fontSize = size + "px";
  // shrink until it fits horizontally
  for (let i = 0; i < 8 && wordEl.scrollWidth > availW; i++){
    size *= availW / wordEl.scrollWidth;
    wordEl.style.fontSize = size + "px";
  }
}
window.addEventListener("resize", fitWord);

/* ============================================================
   SOUNDS  (WebAudio – no files needed)
   ============================================================ */
let audioCtx = null;
function ctx(){
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function tone(freq, t0, dur, type, vol){
  const ac = ctx();
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0, ac.currentTime + t0);
  g.gain.linearRampToValueAtTime(vol, ac.currentTime + t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t0 + dur);
  o.connect(g).connect(ac.destination);
  o.start(ac.currentTime + t0);
  o.stop(ac.currentTime + t0 + dur + 0.05);
}
function blip(){                       // page-turn blip
  if (!settings.sound) return;
  try { tone(520, 0, .12, "triangle", .25); tone(780, .07, .14, "triangle", .2); } catch {}
}
function fanfare(){                    // success arpeggio
  if (!settings.sound) return;
  try {
    [523, 659, 784, 1047].forEach((f, i) => tone(f, i * .11, .3, "triangle", .3));
    tone(1319, .44, .5, "sine", .22);
  } catch {}
}

/* ============================================================
   CELEBRATION
   ============================================================ */
const CHEERS = ["Hooray!", "You did it!", "Wow!", "Super!", "Yes yes yes!", "Oh, the words you know!"];
const BURST_EMOJI = ["⭐", "🌟", "💚", "🍳", "✨", "🎩", "🎈"];

function burstConfetti(count){
  const cx = innerWidth / 2, cy = innerHeight / 2;
  for (let i = 0; i < count; i++){
    const s = document.createElement("span");
    s.className = "burst";
    s.textContent = BURST_EMOJI[Math.floor(Math.random() * BURST_EMOJI.length)];
    const ang = (i / count) * Math.PI * 2 + Math.random() * .5;
    const dist = 25 + Math.random() * 30;
    s.style.left = cx + "px"; s.style.top = cy + "px";
    s.style.setProperty("--dx", Math.cos(ang) * dist + "vmin");
    s.style.setProperty("--dy", Math.sin(ang) * dist + "vmin");
    s.style.setProperty("--rot", (Math.random() * 360 - 180) + "deg");
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1100);
  }
}

function celebrate(){
  fanfare();
  cheerEl.textContent = CHEERS[Math.floor(Math.random() * CHEERS.length)];
  cheerEl.classList.remove("show");
  void cheerEl.offsetWidth;
  cheerEl.classList.add("show");
  burstConfetti(14);
}

/* ============================================================
   FINISH SCREEN
   ============================================================ */
const FINISH_VARIANTS = [
  ["🎉", "Well done!"],
  ["⭐", "Great job!"],
  ["🍳", "Super reading!"],
  ["🎩", "Wow, what a reader!"],
  ["🌟", "You did it!"],
  ["💚", "Hip hip hooray!"]
];

function finishGame(){
  finished = true;
  current = null;
  stopListening();
  updateProgress();                                    // bar fills to 100%
  const [emoji, text] = FINISH_VARIANTS[Math.floor(Math.random() * FINISH_VARIANTS.length)];
  $("finishEmoji").textContent = emoji;
  $("finishText").textContent = text;
  const fin = $("finish");
  fin.classList.remove("show");
  void fin.offsetWidth;
  fin.classList.add("show");
  fanfare();
  burstConfetti(22);
}

function restartGame(){
  finished = false;
  $("finish").classList.remove("show");
  buildDeck();
  nextWord();
  if (settings.mode === "speech") startListening();
}

$("finish").addEventListener("pointerdown", e => {
  e.stopPropagation();
  blip();
  restartGame();
});

/* ============================================================
   ADVANCING
   ============================================================ */
function advance(withParty){
  if (advancing || finished) return;
  advancing = true;
  if (withParty) celebrate(); else blip();
  wordEl.classList.remove("pop-in");
  wordEl.classList.add("pop-out");
  setTimeout(() => {
    nextWord();
    advancing = false;
    if (settings.mode === "speech") startListening();
  }, withParty ? 950 : 240);
}

/* manual input */
stage.addEventListener("pointerdown", () => {
  ctx();                                   // unlock audio on first gesture
  if (settings.mode === "manual") advance(false);
});
window.addEventListener("keydown", e => {
  if (e.code === "Space" && !overlay.classList.contains("open")){
    e.preventDefault();
    if (finished){ blip(); restartGame(); return; }
    if (settings.mode === "manual") advance(false);
  }
});

/* ============================================================
   SPEECH MODE  (native Web Speech API — free, on-device/browser)
   ============================================================ */
let rec = null, listening = false, wantListening = false;

function normalize(s){
  return s.toLowerCase().replace(/[^a-z' ]/g, " ").replace(/\s+/g, " ").trim();
}

function isMatch(transcript, target){
  const t = target.toLowerCase();
  const accept = new Set([t, ...(HOMOPHONES[t] || [])]);
  const clean = normalize(transcript);
  if (accept.has(clean)) return true;                       // exact phrase
  if (clean.replace(/ /g, "") === t) return true;           // "any where"
  return clean.split(" ").some(tok => accept.has(tok));     // whole tokens
}

function startListening(){
  if (!SR || settings.mode !== "speech" || finished) return;
  wantListening = true;
  if (listening) return;
  rec = new SR();
  rec.lang = "en-GB";
  rec.continuous = false;
  rec.interimResults = true;
  rec.maxAlternatives = 5;

  rec.onstart = () => { listening = true; ear.classList.add("listening"); earText.textContent = "I'm listening…"; };
  rec.onresult = e => {
    if (advancing) return;
    for (const result of e.results){
      for (const alt of result){
        if (isMatch(alt.transcript, current)){
          stopListening();
          advance(true);
          return;
        }
      }
    }
    earText.textContent = "Try again!";
    setTimeout(() => { if (listening) earText.textContent = "I'm listening…"; }, 1400);
  };
  rec.onerror = e => {
    if (e.error === "not-allowed" || e.error === "service-not-allowed"){
      wantListening = false;
      earText.textContent = "Mic blocked 😢";
      ear.classList.remove("listening");
    }
  };
  rec.onend = () => {
    listening = false;
    ear.classList.remove("listening");
    if (wantListening && settings.mode === "speech" && !advancing){
      setTimeout(() => { try { rec.start(); } catch {} }, 250);
    }
  };
  try { rec.start(); } catch {}
}

function stopListening(){
  wantListening = false;
  if (rec){ try { rec.onend = null; rec.stop(); } catch {} }
  listening = false;
  ear.classList.remove("listening");
}

$("skipBtn").addEventListener("pointerdown", e => {
  e.stopPropagation();
  stopListening();
  advance(false);
});

/* ============================================================
   HEAR-THE-WORD (text-to-speech)
   ============================================================ */
$("speakBtn").addEventListener("pointerdown", e => {
  e.stopPropagation();
  if (!("speechSynthesis" in window) || !current) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(current);
  u.rate = 0.75; u.pitch = 1.15; u.lang = "en-GB";
  speechSynthesis.speak(u);
});

/* ============================================================
   SETTINGS UI
   ============================================================ */
function paintSettings(){
  document.querySelectorAll("#modeSeg button").forEach(b =>
    b.classList.toggle("on", b.dataset.mode === settings.mode));
  document.querySelectorAll("#diffSeg button").forEach(b =>
    b.classList.toggle("on", b.dataset.diff === settings.diff));
  document.querySelectorAll("#soundSeg button").forEach(b =>
    b.classList.toggle("on", (b.dataset.sound === "on") === settings.sound));
  document.body.classList.toggle("speech-mode", settings.mode === "speech");
  hintEl.textContent = settings.mode === "speech"
    ? "say the word out loud!"
    : "tap anywhere or press space for the next word";
}

const speechNote = $("speechNote");
if (!SR){
  document.querySelector('#modeSeg button[data-mode="speech"]').disabled = true;
  speechNote.style.display = "block";
  speechNote.textContent = "Speech isn't supported in this browser — try Chrome, Edge or Safari.";
} else if (location.protocol === "file:"){
  speechNote.style.display = "block";
  speechNote.textContent = "Speech mode needs the page served over http(s) — it will work once published.";
}

$("modeSeg").addEventListener("click", e => {
  const b = e.target.closest("button[data-mode]");
  if (!b || b.disabled) return;
  settings.mode = b.dataset.mode;
  saveSettings(); paintSettings();
});
$("diffSeg").addEventListener("click", e => {
  const b = e.target.closest("button[data-diff]");
  if (!b) return;
  settings.diff = b.dataset.diff;
  saveSettings(); paintSettings();
  buildDeck();              // new difficulty -> fresh shuffled deck
  deckDirty = true;         // -> new game starts when panel closes
});
$("soundSeg").addEventListener("click", e => {
  const b = e.target.closest("button[data-sound]");
  if (!b) return;
  settings.sound = b.dataset.sound === "on";
  saveSettings(); paintSettings();
});

$("gearBtn").addEventListener("pointerdown", e => {
  e.stopPropagation();
  stopListening();
  overlay.classList.add("open");
});
function closePanel(){
  overlay.classList.remove("open");
  if (deckDirty || finished){                   // new game (difficulty change or game over)
    deckDirty = false;
    finished = false;
    $("finish").classList.remove("show");
    if (!deck.length) buildDeck();
    nextWord();
  }
  if (settings.mode === "speech") startListening();
}
$("closeBtn").addEventListener("click", closePanel);
overlay.addEventListener("pointerdown", e => {
  e.stopPropagation();
  if (e.target === overlay) closePanel();
});

/* pause listening when tab hidden (saves battery on the tablet) */
document.addEventListener("visibilitychange", () => {
  if (document.hidden) stopListening();
  else if (settings.mode === "speech" && !overlay.classList.contains("open")) startListening();
});

/* ============================================================
   GO!
   ============================================================ */
paintSettings();
buildDeck();
nextWord();
if (settings.mode === "speech") startListening();
</script>
